events {
    worker_connections 1024;
}

http {
    # -----------------------------------------------
    # Upstream: Servidor Rust (Core API)
    # -----------------------------------------------
    upstream rust_api {
        server api:7878;
    }

    # -----------------------------------------------
    # Upstream: Reporting API (Futuro)
    # -----------------------------------------------
    # upstream reporting_api {
    #     server reporting_api:3000;
    # }

    server {
        listen 80;
        server_name _;

        # -------------------------------------------
        # Rotas do Servidor Rust (Core)
        # -------------------------------------------
        location /health {
            proxy_pass http://rust_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /auth {
            proxy_pass http://rust_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /users {
            proxy_pass http://rust_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /medicines {
            proxy_pass http://rust_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/devices {
            proxy_pass http://rust_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -------------------------------------------
        # Rotas do Reporting API (Futuro)
        # -------------------------------------------
        # location /reports {
        #     proxy_pass http://reporting_api;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }

        # Rota padrão: retorna 404 para qualquer caminho não mapeado
        location / {
            return 404 '{"error": "Route not found"}';
            default_type application/json;
        }
    }
}
