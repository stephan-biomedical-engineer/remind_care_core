services:
  postgres:
    image: postgres:16
    container_name: rust_server_postgres
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./core_api
    container_name: rust_server_api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env.dev
    # Porta NÃO exposta ao host. Apenas acessível pela rede interna do Docker.
    # O Nginx é o único ponto de entrada.
    expose:
      - "7878"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: rust_server_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  # -----------------------------------------------
  # Microsserviço: Gerador de Relatórios (Futuro)
